name: CI
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
      - run: vp install --frozen-lockfile
      - run: vp run build
      - name: Diagnose formatter drift (temporary)
        run: |
          vp check --fix || true
          git diff --stat | tail -5
          git diff | head -60
          git checkout -- .
      - run: vp check
      - run: vp test run
