name: CI
on: [push, pull_request]
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: voidzero-dev/setup-vp@v1
      # setup-vp provides `vp` but no global pnpm; the quality-gate scripts and
      # Playwright's webServer commands invoke pnpm directly.
      - uses: pnpm/action-setup@v4
      - run: vp install --frozen-lockfile
      - run: vp run build
      - run: vp check
      - run: vp test run
      - run: pnpm run test:bundle
      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
      - run: pnpm run test:react-scan
      - run: pnpm run test:a11y
      - run: pnpm run test:lighthouse
      - run: pnpm run test:react-doctor
      - name: Upload quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: .ci/reports
          if-no-files-found: ignore
